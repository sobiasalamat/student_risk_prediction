<!DOCTYPE html>
<html>
<head>
    <title>Student Risk Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#eef2f7;">

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Student AI Risk Prediction</h2>
        <p class="text-muted">Enter student performance data</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow border-0">
                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Attendance</label>
                            <input type="number" name="attendance" class="form-control" min="0" max="100" required>
                        </div>

                        <div class="mb-3">
                            <label>Assignment</label>
                            <input type="number" name="assignment" class="form-control" min="0" max="100" required>
                        </div>

                        <div class="mb-3">
                            <label>Quiz</label>
                            <input type="number" name="quiz" class="form-control" min="0" max="100" required>
                        </div>

                        <div class="mb-3">
                            <label>Midterm</label>
                            <input type="number" name="midterm" class="form-control" min="0" max="100" required>
                        </div>

                        <div class="mb-3">
                            <label>LMS Activity</label>
                            <input type="number" name="lms" class="form-control" min="0" max="100" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Predict Risk
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>

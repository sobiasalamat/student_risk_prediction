<!DOCTYPE html>
<html>
<head>
    <title>AI Student Risk Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <!-- Header -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">AI Student Risk Prediction </h2>
        <p class="text-muted">Machine Learning Powered System</p>
    </div>

    <!-- Result Card -->
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0">

                <div class="card-header text-white text-center
                    {% if prediction == 'High Risk' %} bg-danger
                    {% elif prediction == 'Low Risk' %} bg-success
                    {% elif prediction == 'Medium Risk' %} bg-warning
                    {% else %} bg-secondary
                    {% endif %}
                ">
                    <h4 class="mb-0">Prediction Result</h4>
                </div>

                <div class="card-body text-center">

                    <h1 class="
                        {% if prediction == 'High Risk' %} text-danger
                        {% elif prediction == 'Low Risk' %} text-success
                        {% elif prediction == 'Medium Risk' %} text-warning
                        {% endif %}
                    ">
                        {{ prediction }}
                    </h1>

                    <hr>

                    <p><strong>Raw Model Output:</strong> {{ raw_output }}</p>

                    <a href="/predict/" class="btn btn-primary mt-3">Try Again</a>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
